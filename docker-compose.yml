services:
  renamer:
    image: "lemonc7/renamer:3.2"
    container_name: renamer
    network_mode: bridge
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - ./config:/app/config:ro # 需要在宿主机中创建config.yaml挂载到容器中
      - /media:/mnt/media:rw
    ports:
      - 8080:8080 # 容器内部端口由config.yaml决定
    restart: always
